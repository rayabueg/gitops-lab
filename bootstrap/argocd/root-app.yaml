apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-lab-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rayabueg/cluster-addons.git
    targetRevision: main
    path: clusters/k8s-lab
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
