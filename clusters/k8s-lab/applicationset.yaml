apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons-k8s-lab
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/rayabueg/cluster-addons.git
        revision: main
        directories:
          - path: clusters/k8s-lab/addons/*
  template:
    metadata:
      name: '{{path.basename}}-k8s-lab'
    spec:
      project: default
      source:
        repoURL: https://github.com/rayabueg/cluster-addons.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # Default namespace — resources with explicit namespaces use their own.
        # Application CRDs rendered by Helm addons have metadata.namespace: argocd.
        namespace: argocd
      ignoreDifferences:
        # CRDs: Kubernetes mutates last-applied-configuration and status at runtime;
        # these fields are not part of our desired state and cause spurious OutOfSync.
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
            - /status
        # Webhooks: caBundle is injected at runtime by the cert controller (e.g. istiod,
        # cert-manager cainjector). Ignore it so ArgoCD doesn't try to revert it.
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[].clientConfig.caBundle
          jsonPointers:
            - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[].clientConfig.caBundle
          jsonPointers:
            - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          # Note: ServerSideApply is omitted — client-side apply is used so that
          # ignoreDifferences works correctly for resources with runtime-injected fields.
          - SkipDryRunOnMissingResource=true
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 15
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
