apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonAnnotations:
  argocd.argoproj.io/sync-wave: "1"

resources:
  - eg-envoyproxy.yaml
  - eg-gateway.yaml
  # ArgoCD TLS passthrough — routes port 9090 on the gateway to argocd-server:443
  - argocd-tlsroute.yaml
  # Simpler CDN-based React demo (no build step) — served at /ui
  - demo-react-ui.yaml
  # Echo backend wired to the catch-all route /
  - demo-backend.yaml
  - demo-httproute.yaml
  # Whoami service — served at /hello
  - demo-hello.yaml


