apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - application.yaml
  # Note: hubble-ui uses <base href="/"> and cannot be served under a subpath via
  # URL rewrite. Access it via: kubectl port-forward svc/hubble-ui -n kube-system 12000:80
  # then open http://localhost:12000
