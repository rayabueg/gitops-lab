apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - application.yaml
  - httproute.yaml
  # hubble-ui is served via a dedicated Gateway listener on port 8080.
  # HTTPRoute matches / on the 'hubble' listener — no URL rewrite needed.
  # Port-forward: kubectl port-forward svc/envoy-envoy-gateway-system-eg-... -n envoy-gateway-system 12000:8080
