apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-demo
  namespace: mesh-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mesh-demo
  template:
    metadata:
      labels:
        app: mesh-demo
    spec:
      containers:
        - name: whoami
          # traefik/whoami is ARM64-safe (multi-arch). Do NOT use hashicorp/http-echo.
          image: traefik/whoami:v1.10.3
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
