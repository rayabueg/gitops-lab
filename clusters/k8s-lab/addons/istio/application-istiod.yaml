apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    # Wave -3: after CRDs, before CNI and ztunnel.
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.24.3
    helm:
      releaseName: istiod
      values: |
        # Ambient profile: no sidecars, no ingress gateway.
        profile: ambient
        # Disable Istio's own ingress gateway — Envoy Gateway is the sole ingress.
        components:
          ingressGateways:
            - name: istio-ingressgateway
              enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 15
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
