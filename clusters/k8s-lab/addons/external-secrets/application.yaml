apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://external-secrets.io
    chart: external-secrets
    targetRevision: 2.3.0
    helm:
      releaseName: external-secrets
      values: |
        # External Secrets Operator (ESO)
        # After install, define a SecretStore/ClusterSecretStore for your backend (AWS/GCP/Azure/Vault/etc)
        # and then create ExternalSecret resources.
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  ignoreDifferences:
    # CRDs often have benign drift due to defaulting and apiserver-managed fields.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: externalsecrets.external-secrets.io
      jsonPointers:
        - /status
        - /metadata/annotations
        - /metadata/labels
        - /spec/conversion
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
