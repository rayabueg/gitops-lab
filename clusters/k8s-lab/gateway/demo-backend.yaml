apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-echo
  namespace: envoy-gateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-echo
  template:
    metadata:
      labels:
        app: demo-echo
    spec:
      containers:
        - name: echo
          image: gcr.io/k8s-staging-gateway-api/echo-basic:v20231214-v1.0.0-140-gf544a46e
          ports:
            - containerPort: 3000
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: demo-echo
  namespace: envoy-gateway-system
spec:
  selector:
    app: demo-echo
  ports:
    - name: http
      port: 3000
      targetPort: http
