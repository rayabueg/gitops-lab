apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-vite-ui
  namespace: envoy-gateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-vite-ui
  template:
    metadata:
      labels:
        app: demo-vite-ui
    spec:
      containers:
        - name: ui
          image: ghcr.io/rayabueg/demo-vite-ui:0.2.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /vite/
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: demo-vite-ui
  namespace: envoy-gateway-system
spec:
  selector:
    app: demo-vite-ui
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-vite-ui
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vite
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: demo-vite-ui
          port: 8080
          weight: 1
