apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.20.0
    helm:
      releaseName: external-dns
      values: |
        # ExternalDNS requires a DNS provider configuration + credentials.
        # Configure those first, then sync this Application.

        # Example provider (replace): aws | cloudflare | azure | google | rfc2136 | ...
        provider:
          name: aws

        # Safety for first runs. Set to false once provider/credentials are verified.
        dryRun: true

        # Limit which hostnames ExternalDNS manages.
        domainFilters:
          - example.com

        policy: sync
        registry: txt
        txtOwnerId: sdp-lab

        sources:
          - service
          - ingress
          - gateway-httproute
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Replace=true
