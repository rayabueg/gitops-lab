# Strategic merge patch: change the argocd-server Service http port from 80 → 9080
# so it matches the Envoy Gateway argocd listener (port 9080) and localhost port-forward.
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
spec:
  ports:
    - name: http
      port: 9080
      targetPort: 8080
