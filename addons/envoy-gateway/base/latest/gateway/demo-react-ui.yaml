apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-react-ui
  namespace: envoy-gateway-system
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>k8s-lab UI</title>
        <style>
          body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
          .container { max-width: 720px; margin: 48px auto; padding: 0 16px; }
          .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
          .muted { color: #6b7280; }
          button { padding: 10px 12px; border-radius: 10px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; }
          button:hover { background: #f9fafb; }
          code { background: #f3f4f6; padding: 2px 6px; border-radius: 8px; }
        </style>
      </head>
      <body>
        <div id="root"></div>

        <!-- React ("popular framework") via CDN for a zero-build demo -->
        <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

        <script>
          const { useMemo, useState } = React;

          function App() {
            const [count, setCount] = useState(0);
            const now = useMemo(() => new Date().toISOString(), []);

            return React.createElement(
              'div',
              { className: 'container' },
              React.createElement('h1', null, 'k8s-lab UI (React)'),
              React.createElement(
                'p',
                { className: 'muted' },
                'Served from a ConfigMap via Nginx, routed through Envoy Gateway.'
              ),
              React.createElement(
                'div',
                { className: 'card' },
                React.createElement('p', null, 'Loaded at: ', React.createElement('code', null, now)),
                React.createElement('p', null, 'Clicks: ', React.createElement('code', null, String(count))),
                React.createElement(
                  'button',
                  { onClick: () => setCount((c) => c + 1) },
                  'Click me'
                )
              )
            );
          }

          ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-react-ui
  namespace: envoy-gateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-react-ui
  template:
    metadata:
      labels:
        app: demo-react-ui
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site
          configMap:
            name: demo-react-ui
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: demo-react-ui
  namespace: envoy-gateway-system
spec:
  selector:
    app: demo-react-ui
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-react-ui
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ui
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: demo-react-ui
          port: 80
          weight: 1
